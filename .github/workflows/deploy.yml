name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Java
        # firebase-tools requires JDK 21+ for the database emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set frontend version
        run: |
          echo "{ \"simpleVersion\": \"${GITHUB_SHA::7}\" }" > web/src/version.json

      - name: Install node dependencies
        run: npm ci
        working-directory: ./web

      - name: Install assist
        run: npm i -g @staff0rd/assist

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r .dependencies[\"@playwright/test\"].version)" >> $GITHUB_OUTPUT
        working-directory: ./web

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm run e2e:install
        working-directory: ./web

      - name: Verify
        run: assist verify

      - name: Run end-to-end tests
        run: assist run e2e

      - name: Build frontend
        # Production Firebase config is baked into the static build; without
        # VITE_FIREBASE_DATABASE_URL the app falls back to the local emulator
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
        run: npm run build
        working-directory: ./web

      - name: Deploy database security rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase-tools deploy --only database --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        working-directory: ./web

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --no-build --dir=dist --prod -s ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} --message "Deployed commit ${{ github.sha }}"
        working-directory: ./web

name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Get version
        run: echo "semantic_version=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - run: echo "semantic version is ${{ env.semantic_version }}"

      - name: Set frontend version
        run: |
          echo "{ \"simpleVersion\": \"${{ env.semantic_version }}\" }" > web/src/version.json

      - name: Install node dependencies
        run: npm ci
        working-directory: ./web

      - name: Build frontend
        # Production Firebase config is baked into the static build; without
        # VITE_FIREBASE_DATABASE_URL the app falls back to the local emulator
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
        run: npm run build
        working-directory: ./web

      - name: Deploy database security rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase-tools deploy --only database --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        working-directory: ./web

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push container
        run: |
          docker build --tag staff0rd/digitalicebreakers:${{ env.semantic_version }} .
          docker push staff0rd/digitalicebreakers:${{ env.semantic_version }}

      - uses: octokit/request-action@v2.x
        with:
          route: POST /repos/{owner}/{repo}/dispatches
          owner: staff0rd
          repo: deploy
          event_type: digital-icebreakers
          client_payload: |
            semantic_version: ${{ env.semantic_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
